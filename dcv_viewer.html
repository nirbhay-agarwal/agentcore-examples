<!DOCTYPE html>
<html>
<head>
    <title>Watch Tracker - Live Browser View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            font-family: monospace;
            overflow: hidden;
        }
        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
            border: 1px solid #00ff00;
        }
        #dcv-display {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div id="status">⏳ Connecting to browser session...</div>
    <div id="dcv-display"></div>

    <script src="/dcv-sdk/dcvjs-umd/dcv.js"></script>

    <script>
        let presignedUrl;
        let connection;

        async function initialize() {
            const urlParams = new URLSearchParams(window.location.search);
            presignedUrl = urlParams.get('url');

            if (!presignedUrl) {
                updateStatus('❌ No URL provided', 'red');
                return;
            }

            updateStatus('🔐 Authenticating...', '#ffff00');

            try {
                if (typeof dcv.setWorkerPath === 'function') {
                    dcv.setWorkerPath(window.location.origin + '/dcv-sdk/dcvjs-umd/dcv/');
                }

                dcv.authenticate(presignedUrl, {
                    promptCredentials: (authType, callback) => {
                        callback(null, null);
                    },
                    httpExtraSearchParams: (method, url, body) => {
                        try {
                            return new URL(presignedUrl).searchParams;
                        } catch(e) {
                            return new URLSearchParams();
                        }
                    },
                    success: (auth, result) => {
                        updateStatus('🔌 Connecting...', '#ffff00');
                        const { sessionId, authToken } = result[0];
                        connect(sessionId, authToken);
                    },
                    error: (auth, error) => {
                        updateStatus('❌ Auth failed: ' + JSON.stringify(error), 'red');
                    }
                });

            } catch(error) {
                updateStatus('❌ Error: ' + error.message, 'red');
            }
        }

        function connect(sessionId, authToken) {
            const screenWidth = window.screen.width;
            const screenHeight = window.screen.height;

            dcv.connect({
                url: presignedUrl,
                sessionId: sessionId,
                authToken: authToken,
                divId: 'dcv-display',
                baseUrl: window.location.origin + '/dcv-sdk/dcvjs-umd',
                observers: {
                    httpExtraSearchParams: (method, url, body) => {
                        try {
                            return new URL(presignedUrl).searchParams;
                        } catch(e) {
                            return new URLSearchParams();
                        }
                    },
                    firstFrame: () => {
                        updateStatus('🟢 Live View Connected!', '#00ff00');

                        // Request full screen resolution after connection
                        if (connection && connection.requestDisplayLayout) {
                            connection.requestDisplayLayout([{
                                name: "Main Display",
                                rect: {
                                    x: 0,
                                    y: 0,
                                    width: window.innerWidth,
                                    height: window.innerHeight
                                },
                                primary: true
                            }]);
                        }

                        setTimeout(() => {
                            document.getElementById('status').style.display = 'none';
                        }, 3000);
                    },
                    displayLayout: (serverWidth, serverHeight, heads) => {
                        console.log(`Display layout: ${serverWidth}x${serverHeight}`);
                    },
                    error: (error) => {
                        updateStatus('❌ Stream error: ' + JSON.stringify(error), 'red');
                    },
                    close: () => {
                        updateStatus('⚠️ Session closed', 'orange');
                    }
                }
            })
            .then(conn => {
                connection = conn;
                console.log('✅ Connected!');

                // Request display layout to match window size
                if (conn.requestDisplayLayout) {
                    conn.requestDisplayLayout([{
                        name: "Main Display",
                        rect: {
                            x: 0,
                            y: 0,
                            width: window.innerWidth,
                            height: window.innerHeight
                        },
                        primary: true
                    }]);
                }
            })
            .catch(error => {
                updateStatus('❌ Connect failed: ' + error.message, 'red');
            });
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            if (connection && connection.requestDisplayLayout) {
                connection.requestDisplayLayout([{
                    name: "Main Display",
                    rect: {
                        x: 0,
                        y: 0,
                        width: window.innerWidth,
                        height: window.innerHeight
                    },
                    primary: true
                }]);
            }
        });

        function updateStatus(message, color = '#00ff00') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.color = color;
            status.style.borderColor = color;
        }

        window.addEventListener('load', initialize);
    </script>
</body>
</html>
