<!DOCTYPE html>
<html>
<head>
    <title>Browser Live View</title>
    <script src="https://d2908q01vomqb2.cloudfront.net/dcv-web-sdk/dcv.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }
        #dcv-display {
            width: 100vw;
            height: 100vh;
        }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="status">Connecting to browser session...</div>
    <div id="dcv-display"></div>
    
    <script>
        let auth;
        let connection;
        let presignedUrl;

        async function startAndConnect() {
            const urlParams = new URLSearchParams(window.location.search);
            presignedUrl = urlParams.get('url');
            
            if (!presignedUrl) {
                document.getElementById('status').textContent = 'Error: No presigned URL provided';
                return;
            }

            document.getElementById('status').textContent = 'Authenticating...';

            dcv.setLogLevel(dcv.LogLevel.INFO);
            
            try {
                auth = dcv.authenticate(presignedUrl, {
                    promptCredentials: onPromptCredentials,
                    error: onError,
                    success: (auth, result) => {
                        const { sessionId, authToken } = result[0];
                        document.getElementById('status').textContent = 'Connecting...';
                        connect(presignedUrl, sessionId, authToken);
                    },
                    httpExtraSearchParams: httpExtraSearchParamsCb
                });
            } catch (error) {
                document.getElementById('status').textContent = 'Error: ' + error.message;
            }
        }

        function connect(serverUrl, sessionId, authToken) {
            dcv.connect({
                url: serverUrl,
                sessionId: sessionId,
                authToken: authToken,
                divId: 'dcv-display',
                observers: {
                    httpExtraSearchParams: httpExtraSearchParamsCb,
                    displayLayout: displayLayoutCallbackCb,
                }
            })
            .then((conn) => {
                console.log('Connection established');
                connection = conn;
                document.getElementById('status').textContent = '🟢 Connected - Live Browser View';
                setTimeout(() => {
                    document.getElementById('status').style.display = 'none';
                }, 3000);
            })
            .catch((error) => {
                console.error('Connection failed:', error.message);
                document.getElementById('status').textContent = 'Connection failed: ' + error.message;
            });
        }

        function httpExtraSearchParamsCb(method, url, body) {
            const searchParams = new URL(presignedUrl).searchParams;
            return searchParams;
        }

        function displayLayoutCallbackCb(layout) {
            console.log('Display layout:', layout);
        }

        function onPromptCredentials(credentialsChallenge, updateCredentials) {
            console.log('Credentials requested');
        }

        function onError(error) {
            console.error('Authentication error:', error);
            document.getElementById('status').textContent = 'Auth error: ' + error.message;
        }

        window.addEventListener('load', startAndConnect);
    </script>
</body>
</html>
